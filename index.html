<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Things Fall Apart Analysis</title>
    <!-- Link to the external CSS file -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <!-- Interactive button handled by JavaScript -->
        <button id="theme-toggle" class="theme-toggle">🌙 Switch to Dark Mode</button>

        <p>Based on <strong>Things Fall Apart</strong> by Chinua Achebe</p>
        
        <div class="chart-container">
            <img src="chart.png" alt="Pie Chart showing character frequency in Things Fall Apart">
        </div>
    </div>
    
    <!-- Link to the external JS file -->
    <script src="script.js"></script>
</body>
</html>
